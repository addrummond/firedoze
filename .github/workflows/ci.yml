name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: CGO_ENABLED=0 go test ./...

  cross-build:
    name: Cross-build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            packages: ./cmd/firedoze ./cmd/firedoze-image-builder
          - goos: darwin
            goarch: arm64
            packages: ./cmd/firedoze ./cmd/firedoze-image-builder
          - goos: linux
            goarch: amd64
            packages: ./cmd/firedoze ./cmd/firedoze-image-builder ./cmd/firedozed
          - goos: linux
            goarch: arm64
            packages: ./cmd/firedoze ./cmd/firedoze-image-builder
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          PACKAGES: ${{ matrix.packages }}
        run: |
          set -euo pipefail
          mkdir -p dist/ci
          for package in $PACKAGES; do
            name="${package##*/}"
            CGO_ENABLED=0 go build -trimpath -o "dist/ci/${name}_${GOOS}_${GOARCH}" "$package"
          done

  package:
    name: Package release artifacts
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts
        run: ./scripts/build-release-artifacts.sh v0.0.0-ci dist/ci-release
