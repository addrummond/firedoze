name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: CGO_ENABLED=0 go test ./...

      - name: Build release artifacts
        run: ./scripts/build-release-artifacts.sh "$TAG_NAME"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/release/* --clobber
          else
            release_args=(--verify-tag --title "$TAG_NAME" --generate-notes)
            if [[ "$TAG_NAME" == *-* ]]; then
              release_args+=(--prerelease)
            fi
            gh release create "$TAG_NAME" dist/release/* \
              "${release_args[@]}"
          fi
