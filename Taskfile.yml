version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  fmt:
    desc: Format Go source
    cmds:
      - gofmt -w cmd internal

  test:
    desc: Run the Go test suite
    cmds:
      - go test ./...

  check:
    desc: Format and test
    cmds:
      - task: fmt
      - task: test

  build:
    desc: Build all local binaries into the repo root
    deps:
      - build:client
      - build:daemon
      - build:image

  build:client:
    desc: Build ./firedoze
    cmds:
      - go build -o firedoze ./cmd/firedoze

  build:daemon:
    desc: Build ./firedozed
    cmds:
      - go build -o firedozed ./cmd/firedozed

  build:image:
    desc: Build ./firedoze-image
    cmds:
      - go build -o firedoze-image ./cmd/firedoze-image

  clean:
    desc: Remove local build outputs
    cmds:
      - rm -f firedoze firedozed firedoze-image

  image:build:
    desc: Build the Ubuntu base image into dist/base-image
    cmds:
      - go run ./cmd/firedoze-image build {{.CLI_ARGS}}

  image:install:
    desc: Install dist/base-image artifacts into /var/lib/firedoze/images
    cmds:
      - sudo install -d -m 0755 /var/lib/firedoze/images
      - sudo install -m 0644 dist/base-image/vmlinux.bin /var/lib/firedoze/images/vmlinux.bin
      - sudo install -m 0644 dist/base-image/initrd.img /var/lib/firedoze/images/initrd.img
      - sudo install -m 0644 dist/base-image/rootfs.ext4 /var/lib/firedoze/images/rootfs.ext4
