version: '3'

vars:
  FIRECRACKER_VERSION: v1.15.1
  FIRECRACKER_X86_64_SHA256: d4a32ab2322d887ca1bc4a4e7afa9cc35393e6362dfc2b3becb389d362e4275a
  PACKAGE_VERSION: 0.0.0-dev

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  fmt:
    desc: Format Go source
    cmds:
      - gofmt -w cmd internal integration

  test:
    desc: Run the Go test suite
    cmds:
      - CGO_ENABLED=0 go test ./...

  test:coverage:
    desc: Run fast tests, enforce package coverage floors, and print coverage sorted from lowest to highest
    cmds:
      - ./scripts/test-coverage.sh {{.CLI_ARGS}}

  test:integration:
    desc: Run opt-in Linux integration tests
    cmds:
      - |
        set -eu
        if [ "${FIREDOZE_INTEGRATION:-}" != "1" ]; then
          echo "integration tests skipped; set FIREDOZE_INTEGRATION=1 on a configured Linux host"
          exit 0
        fi
        if [ "$(uname -s)" != "Linux" ]; then
          echo "integration tests require Linux"
          exit 1
        fi
        CGO_ENABLED=0 go test -tags=integration ./...

  test:all:
    desc: Run fast tests plus opt-in integration tests when enabled
    cmds:
      - task: test
      - task: test:integration

  check:
    desc: Format and test
    cmds:
      - task: fmt
      - task: test

  setup:host:
    desc: Install firedoze, Firecracker, and the default base image on this host
    cmds:
      - task: install
      - task: firecracker:install
      - task: build
      - task: image:setup

  install:
    desc: Build and install firedoze binaries, docs, config example, and systemd unit
    cmds:
      - ./scripts/install.sh

  build:
    desc: Build all local binaries into the repo root
    deps:
      - build:client
      - build:daemon
      - build:image-builder

  build:client:
    desc: Build ./firedoze
    cmds:
      - CGO_ENABLED=0 go build -o firedoze ./cmd/firedoze

  build:daemon:
    desc: Build ./firedozed
    cmds:
      - CGO_ENABLED=0 go build -o firedozed ./cmd/firedozed

  build:image-builder:
    desc: Build ./firedoze-image-builder
    cmds:
      - CGO_ENABLED=0 go build -o firedoze-image-builder ./cmd/firedoze-image-builder

  package:
    desc: Build release tarballs plus Linux .deb and .rpm packages into dist/release
    cmds:
      - ./scripts/build-release-artifacts.sh {{.PACKAGE_VERSION}} {{.CLI_ARGS}}

  clean:
    desc: Remove local build outputs
    cmds:
      - rm -f firedoze firedozed firedoze-image-builder

  image:build:
    desc: Build the Ubuntu base image into dist/base-image
    cmds:
      - task: build:image-builder
      - ./firedoze-image-builder build {{.CLI_ARGS}}

  image:install:
    desc: Install dist/base-image artifacts into /var/lib/firedoze/images
    cmds:
      - task: build:image-builder
      - sudo ./firedoze-image-builder install {{.CLI_ARGS}}

  image:setup:
    desc: Build and install the Ubuntu base image into /var/lib/firedoze/images
    cmds:
      - task: build:image-builder
      - sudo ./firedoze-image-builder setup {{.CLI_ARGS}}

  firecracker:install:
    desc: Download and install the upstream Firecracker binary to /usr/lib/firedoze/firecracker
    cmds:
      - |
        set -eu
        arch="$(uname -m)"
        case "$arch" in
          x86_64) sha256="{{.FIRECRACKER_X86_64_SHA256}}" ;;
          *) echo "unsupported architecture: $arch" >&2; exit 1 ;;
        esac
        release_url="https://github.com/firecracker-microvm/firecracker/releases"
        version="{{.FIRECRACKER_VERSION}}"
        tarball="firecracker-$version-$arch.tgz"
        tmp="$(mktemp -d)"
        trap 'rm -rf "$tmp"' EXIT
        curl -fsSL "$release_url/download/$version/$tarball" -o "$tmp/$tarball"
        printf '%s  %s\n' "$sha256" "$tmp/$tarball" | sha256sum -c -
        tar -xzf "$tmp/$tarball" -C "$tmp"
        sudo install -d -m 0755 /usr/lib/firedoze
        sudo install -m 0755 "$tmp/release-$version-$arch/firecracker-$version-$arch" /usr/lib/firedoze/firecracker
        /usr/lib/firedoze/firecracker --version
