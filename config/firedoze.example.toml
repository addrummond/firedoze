# Example firedoze host configuration.
#
# This file is installed as /etc/firedoze/firedoze.example.toml for reference.
# For a real host config, prefer:
#
#   sudo firedozed -init-config -init-sslip-host $(curl -4 https://ifconfig.me)
#
# That command writes /etc/firedoze/firedoze.toml and chooses random private
# network ranges to reduce conflicts when one laptop connects to multiple
# firedoze servers. Placeholder values are marked with:
# EDIT PLACEHOLDER

# EDIT PLACEHOLDER
base_domain = "dev.example.com"
default_http_port = 8080
state_dir = "/var/lib/firedoze"

[api]
port = 8081

[caddy]
http_port = 80
https_port = 443
internal_proxy_port = 18082
# "auto" serves HTTPS locally with Caddy-managed certificates and redirects
# HTTP to HTTPS. Use "behind_proxy" when a local tunnel/reverse proxy such as
# Cloudflare Tunnel terminates public TLS and forwards plain HTTP to firedoze.
tls_mode = "auto"

[metadata]
path = "/var/lib/firedoze/firedoze.db"

[wireguard]
interface = "fdwg0"
listen_port = 51820
address = "fd7a:115c:a1e1::1/64"
# EDIT PLACEHOLDER
endpoint = "YOUR_SERVER_PUBLIC_IP_OR_DNS:51820"
private_key_file = "/etc/firedoze/wg.key"

# Add one peer for each laptop that should administer firedoze.
# Each peer needs a unique /128 address inside the WireGuard subnet.
#
# firedozed -wg-add-peer alice-laptop ALICE_PUBLIC_KEY appends the peer block
# automatically and prints a Firedoze client import config. Client private keys
# stay on client laptops.

[host_firewall]
enabled = true
# Required when host firewalling is enabled. Only "ip6tables" is implemented
# for now; future versions may add an nftables backend.
backend = "ip6tables"

[vm_network]
# Private IPv6 ULA range used for VM addresses. Change it if it overlaps with
# another routed IPv6 range on your network.
subnet = "fd7a:115c:a1e0::/64"

[dns]
enabled = true
domain = "firedoze"
# Reserved host-side DNS IP for VM-to-VM service discovery. Leave blank to use
# the first usable IP in vm_network.subnet.
listen_ip = ""
port = 53
ttl_seconds = 30
upstream_servers = ["1.1.1.1:53", "8.8.8.8:53"]

[ssh]
user = "ubuntu"
# Private SSH wake proxy port on the firedoze host. The firedoze client uses
# this to wake sleeping VMs before handing the connection to the guest SSH port.
wake_proxy_port = 18022

[idle]
check_interval_seconds = 30
default_sleep_after_seconds = 21600

[cold_storage]
# Optional directory for moving disks of long-stopped VMs onto cheaper/slower
# storage. Leave blank to disable cold storage.
dir = ""
archive_stopped_after_seconds = 2592000

[firecracker]
binary_path = "/usr/local/bin/firecracker"
base_kernel_path = "/var/lib/firedoze/images/vmlinux.bin"
base_initrd_path = "/var/lib/firedoze/images/initrd.img"
base_rootfs_path = "/var/lib/firedoze/images/rootfs.ext4"
default_vcpus = 1
default_memory_min_mib = 256
default_memory_max_mib = 1024
default_disk_bytes = 4294967296
